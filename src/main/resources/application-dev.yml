spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/order_system
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

jwt:
  # Fallback é APENAS para desenvolvimento local — nunca usar em produção.
  secret: ${JWT_SECRET:dGhpcy1pcy1hLWRldi1vbmx5LXNlY3JldC1rZXktbWluLTMyLWJ5dGVz}

app:
  upload:
    dir: ${UPLOAD_DIR:./uploads}

logging:
  level:
    com.ordersystem: DEBUG
