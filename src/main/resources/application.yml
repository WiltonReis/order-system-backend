spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/order_system
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

jwt:
  # Produção: definir JWT_SECRET como variável de ambiente (min 32 bytes em Base64).
  # Fallback abaixo é APENAS para desenvolvimento local — nunca usar em produção.
  secret: ${JWT_SECRET:dGhpcy1pcy1hLWRldi1vbmx5LXNlY3JldC1rZXktbWluLTMyLWJ5dGVz}
  expiration: 86400000  # 24 hours in milliseconds

logging:
  level:
    com.ordersystem: DEBUG
