spring:
  profiles:
    active: ${SPRING_PROFILE:dev}

  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=5m

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when-authorized

jwt:
  expiration: 1800000
  refresh-expiration: 2592000000
