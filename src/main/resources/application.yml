spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/order_system
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

jwt:
  # Base64-encoded secret — MUST be changed in production (min 32 bytes decoded)
  secret: aHR0cHM6Ly93d3cuZXhhbXBsZS5jb20vc2VjcmV0LWtleQ==
  expiration: 86400000  # 24 hours in milliseconds

logging:
  level:
    com.ordersystem: DEBUG
